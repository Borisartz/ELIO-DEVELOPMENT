name: elio
description: "ELIO - Smart Waste Sorting Robot Controller App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  google_sign_in: ^6.2.1

  # UI
  flutter_svg: ^2.0.10
  cupertino_icons: ^1.0.8
  mqtt_client: ^10.11.11
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  firebase_auth_mocks: ^0.15.1
  fake_cloud_firestore: ^4.1.0+1
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/